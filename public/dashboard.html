<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bracelet Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --danger: #ff5c6c;
      --warn: #ffb347;
      --text: #e4e6f0;
      --muted: #7a7f9a;
      --card-radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .status-dot.error { background: var(--danger); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .api-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 13px;
      width: 260px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button.secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    button.secondary.active {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
    }

    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 20px 16px;
    }

    .summary-card .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .summary-card .unit {
      font-size: 13px;
      color: var(--muted);
      margin-left: 4px;
    }

    .summary-card .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Latest health panel */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) { .panels { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 20px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .metric-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .metric-row:last-child { border-bottom: none; }

    .metric-name {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .metric-val {
      font-size: 18px;
      font-weight: 700;
    }

    .metric-unit {
      font-size: 12px;
      color: var(--muted);
      margin-left: 3px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.4px;
    }
    .badge-health { background: #1e3a2f; color: var(--accent2); }
    .badge-realtime { background: #1e1e3a; color: var(--accent); }
    .badge-battery { background: #3a2a1e; color: var(--warn); }
    .badge-mac { background: #2a1e3a; color: #c084fc; }
    .badge-error { background: #3a1e1e; color: var(--danger); }
    .badge-unknown { background: var(--surface2); color: var(--muted); }

    /* Battery bar */
    .battery-bar-wrap { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .battery-bar {
      flex: 1; height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .battery-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Packets table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .table-header h2 {
      font-size: 15px;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 10px 16px;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }
    tbody tr:hover { background: var(--surface2); }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 10px 16px;
      vertical-align: middle;
    }

    .mono { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; }

    .no-data {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 14px;
    }

    /* Expandable row */
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-cell {
      background: var(--bg);
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .detail-inner {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .detail-kv { font-size: 12px; }
    .detail-kv .k { color: var(--muted); }
    .detail-kv .v { font-weight: 600; margin-top: 2px; }

    .error-msg { color: var(--danger); font-size: 12px; font-style: italic; }

    /* Loading spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { border-color: var(--accent2); color: var(--accent2); }
    #toast.err { border-color: var(--danger); color: var(--danger); }

    .timestamp { color: var(--muted); font-size: 12px; }

    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">&#x1F4F6; Bracelet Monitor</span>
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText" style="font-size:13px;color:var(--muted);">—</span>
  <div class="header-right">
    <input class="api-input" id="apiBase" value="https://bracelet-pn7r.onrender.com" placeholder="API base URL" />
    <div class="spinner" id="spinner"></div>
    <button class="secondary active" id="autoRefreshBtn" title="Toggle auto-refresh">&#x21BB; Auto</button>
    <button onclick="fetchPackets()">Refresh</button>
  </div>
</header>

<main>
  <!-- Summary row -->
  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card">
      <div class="label">Total Packets</div>
      <div class="value" id="sumTotal">—</div>
    </div>
    <div class="summary-card">
      <div class="label">Heart Rate</div>
      <div class="value" id="sumHR" style="color:#ff6b8a">—<span class="unit">bpm</span></div>
      <div class="sub" id="sumHRTime"></div>
    </div>
    <div class="summary-card">
      <div class="label">SpO2</div>
      <div class="value" id="sumSpo2" style="color:var(--accent2)">—<span class="unit">%</span></div>
    </div>
    <div class="summary-card">
      <div class="label">Temperature</div>
      <div class="value" id="sumTemp" style="color:var(--warn)">—<span class="unit">°C</span></div>
    </div>
    <div class="summary-card">
      <div class="label">Steps</div>
      <div class="value" id="sumSteps" style="color:var(--accent)">—</div>
    </div>
    <div class="summary-card">
      <div class="label">Battery</div>
      <div class="value" id="sumBatVal">—</div>
      <div class="battery-bar-wrap">
        <div class="battery-bar"><div class="battery-fill" id="sumBatBar" style="width:0%;background:var(--accent2)"></div></div>
      </div>
    </div>
    <div class="summary-card">
      <div class="label">Device MAC</div>
      <div class="value mono" id="sumMac" style="font-size:14px">—</div>
    </div>
    <div class="summary-card">
      <div class="label">Last Update</div>
      <div class="value" id="sumLastUpdate" style="font-size:15px;color:var(--muted)">—</div>
    </div>
  </div>

  <!-- Latest panels -->
  <div class="panels">
    <div class="panel">
      <div class="panel-title">Latest Health (0x28)</div>
      <div id="healthPanel">
        <div class="no-data">No health data yet</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Latest Realtime (0x09)</div>
      <div id="realtimePanel">
        <div class="no-data">No realtime data yet</div>
      </div>
    </div>
  </div>

  <!-- Packets table -->
  <div class="table-wrap">
    <div class="table-header">
      <h2>Packet Log</h2>
      <div class="filter-row">
        <label style="font-size:13px;color:var(--muted)">Type:</label>
        <select id="filterType" onchange="renderTable()">
          <option value="">All</option>
          <option value="0x28">0x28 Health</option>
          <option value="0x09">0x09 Realtime</option>
          <option value="0x13">0x13 Battery</option>
          <option value="0x22">0x22 MAC</option>
        </select>
        <label style="font-size:13px;color:var(--muted)">Limit:</label>
        <select id="limitSelect" onchange="fetchPackets()">
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Time</th>
          <th>Device MAC</th>
          <th>Type</th>
          <th>Source</th>
          <th>CRC</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="no-data">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div id="toast"></div>

<script>
  let packets = [];
  let autoRefresh = true;
  let refreshTimer = null;
  const REFRESH_INTERVAL = 5000;

  function apiBase() {
    return document.getElementById('apiBase').value.replace(/\/$/, '');
  }

  async function fetchPackets() {
    const limit = document.getElementById('limitSelect').value;
    const spinner = document.getElementById('spinner');
    spinner.classList.add('active');
    try {
      const res = await fetch(`${apiBase()}/bracelets/packets?limit=${limit}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      packets = Array.isArray(data) ? data : (data.packets || data.data || []);
      setStatus('live', `${packets.length} packets`);
      updateSummary();
      renderPanels();
      renderTable();
    } catch (e) {
      setStatus('error', e.message);
      toast('Failed to fetch: ' + e.message, 'err');
    } finally {
      spinner.classList.remove('active');
    }
  }

  function setStatus(state, msg) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-dot ' + state;
    txt.textContent = msg;
  }

  function updateSummary() {
    document.getElementById('sumTotal').textContent = packets.length;

    // Latest heart rate from 0x28 or 0x09
    const withHR = packets.find(p => p.decoded?.heartRate != null);
    if (withHR) {
      document.getElementById('sumHR').innerHTML = withHR.decoded.heartRate + '<span class="unit">bpm</span>';
      document.getElementById('sumHRTime').textContent = relTime(withHR.created_at);
    }

    // SpO2
    const withSpo2 = packets.find(p => p.decoded?.spo2 != null);
    if (withSpo2) {
      document.getElementById('sumSpo2').innerHTML = withSpo2.decoded.spo2 + '<span class="unit">%</span>';
    }

    // Temp
    const withTemp = packets.find(p => p.decoded?.temperature != null);
    if (withTemp) {
      document.getElementById('sumTemp').innerHTML = withTemp.decoded.temperature + '<span class="unit">°C</span>';
    }

    // Steps
    const withSteps = packets.find(p => p.decoded?.steps != null);
    if (withSteps) {
      document.getElementById('sumSteps').textContent = withSteps.decoded.steps.toLocaleString();
    }

    // Battery
    const bat = packets.find(p => p.decoded?.type === '0x13');
    if (bat) {
      const pct = bat.decoded.battery;
      const color = pct > 50 ? 'var(--accent2)' : pct > 20 ? 'var(--warn)' : 'var(--danger)';
      document.getElementById('sumBatVal').innerHTML = pct + '<span class="unit">%</span>';
      document.getElementById('sumBatBar').style.width = pct + '%';
      document.getElementById('sumBatBar').style.background = color;
    }

    // MAC
    const macPkt = packets.find(p => p.decoded?.type === '0x22' && p.decoded?.mac);
    const anyMac = packets.find(p => p.device_mac);
    const mac = macPkt?.decoded?.mac || anyMac?.device_mac;
    if (mac) document.getElementById('sumMac').textContent = mac;

    // Last update
    if (packets.length > 0) {
      document.getElementById('sumLastUpdate').textContent = relTime(packets[0].created_at);
    }
  }

  function renderPanels() {
    // Health panel
    const h = packets.find(p => p.decoded?.type === '0x28' || p.mergedHealth);
    const healthEl = document.getElementById('healthPanel');
    if (h) {
      const d = h.mergedHealth || h.decoded;
      healthEl.innerHTML = `
        <div class="metric-row">
          <span class="metric-name">&#x2764;&#xFE0F; Heart Rate</span>
          <span><span class="metric-val" style="color:#ff6b8a">${d.heartRate ?? '—'}</span><span class="metric-unit">bpm</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F4A8; SpO2</span>
          <span><span class="metric-val" style="color:var(--accent2)">${d.spo2 ?? '—'}</span><span class="metric-unit">%</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F9E0; HRV</span>
          <span><span class="metric-val" style="color:var(--accent)">${d.hrv ?? '—'}</span><span class="metric-unit">ms</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F9EE; Fatigue</span>
          <span><span class="metric-val">${d.fatigue ?? '—'}</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F321;&#xFE0F; Temperature</span>
          <span><span class="metric-val" style="color:var(--warn)">${d.temperature ?? '—'}</span><span class="metric-unit">°C</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1FA78; Blood Pressure</span>
          <span><span class="metric-val" style="color:#c084fc">${d.systolicPressure ?? '—'}/${d.diastolicPressure ?? '—'}</span><span class="metric-unit">mmHg</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">Mode</span>
          <span class="badge badge-health">${d.measurementMode ?? '—'}</span>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--muted)">${relTime(h.created_at)}</div>
      `;
    } else {
      healthEl.innerHTML = '<div class="no-data">No health data yet</div>';
    }

    // Realtime panel
    const r = packets.find(p => p.decoded?.type === '0x09');
    const realtimeEl = document.getElementById('realtimePanel');
    if (r) {
      const d = r.decoded;
      realtimeEl.innerHTML = `
        <div class="metric-row">
          <span class="metric-name">&#x1F463; Steps</span>
          <span><span class="metric-val" style="color:var(--accent)">${(d.steps ?? 0).toLocaleString()}</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F525; Calories</span>
          <span><span class="metric-val" style="color:var(--warn)">${d.caloriesKcal ?? '—'}</span><span class="metric-unit">kcal</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F4CD; Distance</span>
          <span><span class="metric-val">${d.distanceKm ?? '—'}</span><span class="metric-unit">km</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x2764;&#xFE0F; Heart Rate</span>
          <span><span class="metric-val" style="color:#ff6b8a">${d.heartRate ?? '—'}</span><span class="metric-unit">bpm</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F321;&#xFE0F; Temperature</span>
          <span><span class="metric-val" style="color:var(--warn)">${d.temperature ?? '—'}</span><span class="metric-unit">°C</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x1F4A8; SpO2</span>
          <span><span class="metric-val" style="color:var(--accent2)">${d.spo2 ?? '—'}</span><span class="metric-unit">%</span></span>
        </div>
        <div class="metric-row">
          <span class="metric-name">&#x23F1;&#xFE0F; Active Time</span>
          <span><span class="metric-val">${d.movementTimeRaw ?? '—'}</span><span class="metric-unit">raw</span></span>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--muted)">${relTime(r.created_at)}</div>
      `;
    } else {
      realtimeEl.innerHTML = '<div class="no-data">No realtime data yet</div>';
    }
  }

  function renderTable() {
    const filter = document.getElementById('filterType').value;
    const rows = filter ? packets.filter(p => p.packet_type === filter) : packets;
    const tbody = document.getElementById('tableBody');

    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="no-data">No packets found</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map((p, i) => {
      const id = `row-${p.id}`;
      const badge = badgeFor(p.packet_type);
      const crcIcon = p.crc_valid ? '<span style="color:var(--accent2)">&#x2713;</span>' : '<span style="color:var(--danger)">&#x2717;</span>';
      const summary = summarize(p);
      return `
        <tr onclick="toggleDetail('${id}')">
          <td>${p.id}</td>
          <td class="timestamp">${formatTime(p.created_at)}</td>
          <td class="mono">${p.device_mac || '—'}</td>
          <td><span class="badge ${badge.cls}">${p.packet_type}</span></td>
          <td>${p.source || '—'}</td>
          <td>${crcIcon}</td>
          <td>${summary}</td>
        </tr>
        <tr class="detail-row" id="${id}">
          <td colspan="7" class="detail-cell">
            ${renderDetail(p)}
          </td>
        </tr>
      `;
    }).join('');
  }

  function toggleDetail(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
  }

  function badgeFor(type) {
    const map = {
      '0x28': { cls: 'badge-health' },
      '0x09': { cls: 'badge-realtime' },
      '0x13': { cls: 'badge-battery' },
      '0x22': { cls: 'badge-mac' },
    };
    return map[type] || { cls: 'badge-unknown' };
  }

  function summarize(p) {
    if (p.decode_error) return `<span class="error-msg">${p.decode_error}</span>`;
    const d = p.decoded;
    if (!d) return '<span style="color:var(--muted)">—</span>';
    if (d.type === '0x13') return `Battery: <b>${d.battery}%</b>`;
    if (d.type === '0x22') return `MAC: <b>${d.mac}</b>`;
    if (d.type === '0x28') {
      const view = p.mergedHealth || d;
      const hr = view.heartRate > 0 ? view.heartRate + 'bpm' : '—';
      const spo2 = view.spo2 > 0 ? view.spo2 + '%' : '—';
      const temp = view.temperature > 0 ? view.temperature + '°C' : '—';
      return `HR: <b>${hr}</b> &nbsp; SpO2: <b>${spo2}</b> &nbsp; Temp: <b>${temp}</b>`;
    }
    if (d.type === '0x09') return `Steps: <b>${(d.steps||0).toLocaleString()}</b> &nbsp; HR: <b>${d.heartRate}bpm</b> &nbsp; SpO2: <b>${d.spo2}%</b>`;
    return JSON.stringify(d).slice(0, 80);
  }

  function renderDetail(p) {
    if (p.decode_error) {
      return `<div class="error-msg">Decode error: ${p.decode_error}</div>
              <div style="margin-top:8px;color:var(--muted);font-size:12px">Raw hex: <span class="mono">${p.raw_hex || '—'}</span></div>`;
    }
    const d = p.decoded || {};
    const entries = Object.entries(d).filter(([k]) => k !== 'type');
    if (entries.length === 0) return '<span style="color:var(--muted)">No decoded fields</span>';
    return `<div class="detail-inner">
      ${entries.map(([k, v]) => `
        <div class="detail-kv">
          <div class="k">${camel(k)}</div>
          <div class="v">${v}</div>
        </div>
      `).join('')}
      <div class="detail-kv">
        <div class="k">Raw Hex</div>
        <div class="v mono" style="font-size:11px;word-break:break-all">${p.raw_hex || '—'}</div>
      </div>
    </div>`;
  }

  function camel(s) {
    return s.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase());
  }

  function formatTime(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleTimeString('en-GB', { hour12: false }) + ' ' +
           d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
  }

  function relTime(ts) {
    if (!ts) return '';
    const diff = (Date.now() - new Date(ts)) / 1000;
    if (diff < 60) return `${Math.floor(diff)}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    setTimeout(() => { el.className = ''; }, 3000);
  }

  // Auto-refresh toggle
  document.getElementById('autoRefreshBtn').addEventListener('click', function() {
    autoRefresh = !autoRefresh;
    this.classList.toggle('active', autoRefresh);
    if (autoRefresh) {
      scheduleRefresh();
      toast('Auto-refresh on');
    } else {
      clearTimeout(refreshTimer);
      toast('Auto-refresh off');
    }
  });

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    if (autoRefresh) {
      refreshTimer = setTimeout(async () => {
        await fetchPackets();
        scheduleRefresh();
      }, REFRESH_INTERVAL);
    }
  }

  // Init
  fetchPackets().then(scheduleRefresh);
</script>
</body>
</html>
